<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    padding:20px;
}

h1{
    text-align:center;
    color:white;
    margin-bottom:30px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    max-width:1200px;
    margin:auto;
}

.gallery-item{
    overflow:hidden;
    border-radius:15px;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.gallery-item img{
    width:100%;
    height:250px;
    object-fit:cover;
    transition:0.4s;
}

.gallery-item:hover img{
    transform:scale(1.1);
}

.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:40px;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>🖼️ Responsive Image Gallery</h1>

<div class="gallery">

    <div class="gallery-item">
        <img src="https://picsum.photos/600/400?1" onclick="openImage(this.src)">
    </div>

    <div class="gallery-item">
        <img src="https://picsum.photos/600/400?2" onclick="openImage(this.src)">
    </div>

    <div class="gallery-item">
        <img src="https://picsum.photos/600/400?3" onclick="openImage(this.src)">
    </div>

    <div class="gallery-item">
        <img src="https://picsum.photos/600/400?4" onclick="openImage(this.src)">
    </div>

    <div class="gallery-item">
        <img src="https://picsum.photos/600/400?5" onclick="openImage(this.src)">
    </div>

    <div class="gallery-item">
        <img src="https://picsum.photos/600/400?6" onclick="openImage(this.src)">
    </div>

</div>

<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeImage()">&times;</span>
    <img id="lightboxImg">
</div>

<script>
function openImage(src){
    document.getElementById("lightbox").style.display="flex";
    document.getElementById("lightboxImg").src=src;
}

function closeImage(){
    document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
